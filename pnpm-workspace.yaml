packages:
  - "apps/*"
  - "packages/*"

# pnpm 11: allow packages that ship install/build scripts we rely on.
allowBuilds:
  esbuild: true
  mongodb-memory-server: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

overrides:
  react: "19.1.0"
  react-dom: "19.1.0"
  next: "15.5.21"
  prettier: "^3.6.2"
  shell-quote: "^1.9.0"
  postcss: "^8.5.10"
  esbuild: "^0.28.1"
  jest-mock: "30.4.1"
  tar: "^7.5.19"
  sharp: "^0.35.0"
  axios: "^1.18.0"
  "brace-expansion@<1.1.16": "1.1.16"
  "brace-expansion@>=2.0.0 <2.1.2": "2.1.2"
  "brace-expansion@>=3.0.0 <5.0.7": "5.0.7"
  "js-yaml@>=3 <3.15.0": "3.15.0"
  "js-yaml@>=4 <4.3.0": "4.3.0"
  "ws@>=6.0.0 <6.2.4": "^6.2.4"
  "ws@>=7.0.0 <7.5.11": "^7.5.11"
  "ws@>=8.0.0 <8.21.0": "^8.21.0"
  "xcode>uuid": "^11.1.1"
  form-data: "^4.0.6"
  undici: "^6.27.0"
