name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to roll back to (example: v1.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  # Never cancel an in-flight rollback request.
  group: rollback-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      task_worker_version_tag: ${{ steps.meta.outputs.task_worker_version_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}
      legacy_latest_tag: ${{ steps.meta.outputs.legacy_latest_tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}

    steps:
      - name: Validate rollback version input
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Expected semver tag like v1.2.3"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Resolve rollback metadata
        id: meta
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.inputs.version }}"
          RELEASE_VERSION="${RELEASE_TAG#v}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-socket"
          TASK_WORKER_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-task-worker"
          LEGACY_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chat-services"
          VERSION_TAG="${IMAGE_NAME}:${RELEASE_VERSION}"
          TASK_WORKER_VERSION_TAG="${TASK_WORKER_IMAGE_NAME}:${RELEASE_VERSION}"

          git fetch --force --tags

          if ! git rev-parse --verify "${RELEASE_TAG}^{commit}" >/dev/null 2>&1; then
            echo "::error::Git tag not found: $RELEASE_TAG"
            exit 1
          fi

          RELEASE_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_version=${RELEASE_VERSION}"
            echo "image_name=${IMAGE_NAME}"
            echo "version_tag=${VERSION_TAG}"
            echo "task_worker_version_tag=${TASK_WORKER_VERSION_TAG}"
            echo "latest_tag=${IMAGE_NAME}:latest"
            echo "legacy_latest_tag=${LEGACY_IMAGE_NAME}:latest"
            echo "release_sha=${RELEASE_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify socket rollback image exists in registry
        run: |
          set -euo pipefail
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"
          if ! docker buildx imagetools inspect "$VERSION_TAG" > /dev/null 2>&1; then
            echo "::error::Rollback image not found in registry: $VERSION_TAG"
            echo "::error::Cannot roll back to a version that was never built and pushed."
            exit 1
          fi
          echo "Rollback target socket image verified: $VERSION_TAG"

      - name: Verify task-worker rollback image exists in registry
        if: vars.ENABLE_TASK_WORKER_DEPLOY == 'true'
        run: |
          set -euo pipefail
          TASK_WORKER_VERSION_TAG="${{ steps.meta.outputs.task_worker_version_tag }}"
          if ! docker buildx imagetools inspect "$TASK_WORKER_VERSION_TAG" > /dev/null 2>&1; then
            echo "::error::Rollback image not found in registry: $TASK_WORKER_VERSION_TAG"
            echo "::error::Cannot roll back to a version that was never built and pushed."
            exit 1
          fi
          echo "Rollback target task-worker image verified: $TASK_WORKER_VERSION_TAG"

      - name: Record rollback deployment start
        id: rollback_start
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const result = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "${{ steps.meta.outputs.release_sha }}",
              environment: "production",
              required_contexts: [],
              auto_merge: false,
              transient_environment: false,
              production_environment: true,
              description: `Rollback production to ${{ steps.meta.outputs.release_tag }}`
            });
            core.setOutput("deployment_id", String(result.data.id));

      - name: Checkout rollback release tag
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.meta.outputs.release_tag }}"

      - name: Overlay deploy scripts from main
        run: |
          set -euo pipefail
          git fetch origin
          git checkout origin/main -- scripts/ci/deploy/
          echo "Deploy scripts sourced from origin/main (app at ${{ steps.meta.outputs.release_tag }})"

      - name: Configure SSH key for VPS
        if: vars.ENABLE_TASK_WORKER_DEPLOY == 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Roll back socket on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SOCKET_SERVICE_ID: ${{ vars.RENDER_SOCKET_SERVICE_ID }}
          SOCKET_DEPLOY_REF: ${{ steps.meta.outputs.version_tag }}
        run: bash ./scripts/ci/deploy/render-socket.sh

      - name: Roll back task-worker on VPS
        if: vars.ENABLE_TASK_WORKER_DEPLOY == 'true'
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
          VPS_SSH_IDENTITY_FILE: ~/.ssh/id_ed25519
          TASK_WORKER_DEPLOY_REF: ${{ steps.meta.outputs.task_worker_version_tag }}
        run: |
          set -euo pipefail
          export GHCR_PULL_TOKEN="${{ secrets.GHCR_PULL_TOKEN }}"
          if [[ -z "$GHCR_PULL_TOKEN" ]]; then
            export GHCR_PULL_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          bash ./scripts/ci/deploy/vps-task-worker.sh

      - name: Roll back web on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          DEPLOY_ENVIRONMENT: production
          RELEASE_SHA: ${{ steps.meta.outputs.release_sha }}
        run: bash ./scripts/ci/deploy/vercel.sh

      - name: Health check production after rollback
        id: rollback_health
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -n "${{ vars.PRODUCTION_HEALTHCHECK_URL || '' }}" ]]; then
            curl -f -L --retry 8 --retry-delay 10 "${{ vars.PRODUCTION_HEALTHCHECK_URL }}"
          else
            echo "PRODUCTION_HEALTHCHECK_URL is not set. Skipping web health check."
          fi
          if [[ -n "${{ vars.RENDER_SOCKET_HEALTHCHECK_URL || '' }}" ]]; then
            curl -f -L --retry 8 --retry-delay 10 "${{ vars.RENDER_SOCKET_HEALTHCHECK_URL }}"
          else
            echo "RENDER_SOCKET_HEALTHCHECK_URL is not set. Skipping socket health check."
          fi

      - name: Fail when post-rollback health check fails
        if: steps.rollback_health.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::error::Production health check failed after rollback to ${{ steps.meta.outputs.release_tag }}."
          exit 1

      - name: Mark rollback deployment success
        if: steps.rollback_health.outcome != 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.rollback_start.outputs.deployment_id }}"),
              state: "success",
              environment: "production",
              environment_url: "${{ vars.PRODUCTION_APP_URL || '' }}",
              description: "Rolled back production to ${{ steps.meta.outputs.release_tag }}"
            });

      - name: Mark rollback deployment failure
        if: failure() && steps.rollback_start.outputs.deployment_id != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number("${{ steps.rollback_start.outputs.deployment_id }}"),
              state: "failure",
              environment: "production",
              description: "Rollback to ${{ steps.meta.outputs.release_tag }} failed"
            });

      - name: Rollback summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "### Rollback"
            echo ""
            echo "- Version: ${{ steps.meta.outputs.release_tag }}"
            echo "- Image: ${{ steps.meta.outputs.image_name }}"
            echo "- Socket image tag: ${{ steps.meta.outputs.version_tag }}"
            echo "- Task-worker image tag: ${{ steps.meta.outputs.task_worker_version_tag }}"
            echo "- Health check: ${{ steps.rollback_health.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  restore-moving-tags:
    name: Restore Moving Tags
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rollback-production
    if: needs.rollback-production.result == 'success'
    concurrency:
      # Serialize with deploy promote_moving_tags so concurrent deploy/rollback runs
      # cannot interleave writes to the shared :latest aliases.
      group: promote-moving-tags
      cancel-in-progress: false
    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Point moving tags at rollback target
        run: |
          set -euxo pipefail
          VERSION_TAG="${{ needs.rollback-production.outputs.version_tag }}"
          LATEST_TAG="${{ needs.rollback-production.outputs.latest_tag }}"
          LEGACY_LATEST_TAG="${{ needs.rollback-production.outputs.legacy_latest_tag }}"
          RELEASE_TAG="${{ needs.rollback-production.outputs.release_tag }}"

          docker buildx imagetools create -t "$LATEST_TAG" "$VERSION_TAG"
          docker buildx imagetools create -t "$LEGACY_LATEST_TAG" "$VERSION_TAG"

          echo "Restored moving tags to $RELEASE_TAG:"
          echo "  $LATEST_TAG -> $VERSION_TAG"
          echo "  $LEGACY_LATEST_TAG -> $VERSION_TAG"
