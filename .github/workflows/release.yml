name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    name: Version And Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
     
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js 22 with pnpm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm run build

      - name: Capture existing release tags on commit
        id: tag_before
        run: |
          set -euo pipefail
          RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch --force --tags
          BEFORE_TAGS="$(git tag --points-at "$RELEASE_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' | sort | xargs || true)"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "before_tags=$BEFORE_TAGS" >> "$GITHUB_OUTPUT"

      - name: Version with Changesets
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
          publish: echo "skip publish"
          createGithubReleases: false
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        id: create_tag
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          set -euo pipefail

          # Root package.json is the single source of truth for v* release tags.
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          echo "Evaluating release tag: $TAG"

          git fetch --force --tags
          RELEASE_SHA="$(git rev-parse HEAD)"

          if git rev-parse --verify "$TAG" >/dev/null 2>&1; then
            EXISTING_TAG_SHA="$(git rev-parse "$TAG")"
            if [ "$EXISTING_TAG_SHA" = "$RELEASE_SHA" ]; then
              echo "Tag $TAG already exists on this commit; skipping tag creation"
            else
              echo "Tag $TAG already exists on $EXISTING_TAG_SHA; no new root version on $RELEASE_SHA"
              echo "Skipping tag creation for this commit"
            fi
          else
            echo "Creating tag: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      
      - name: Resolve release metadata
        id: metadata
        run: |
          set -euo pipefail

          RELEASE_SHA="${{ steps.tag_before.outputs.release_sha }}"
          BEFORE_TAGS="${{ steps.tag_before.outputs.before_tags }}"
          SHORT_SHA="$(git rev-parse --short=12 "$RELEASE_SHA")"

          git fetch --force --tags
          AFTER_TAGS="$(git tag --points-at "$RELEASE_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' | sort | xargs || true)"

          DEPLOYABLE="false"
          RELEASE_TAG=""
          RELEASE_VERSION=""

          NEW_TAGS=""
          for tag in $AFTER_TAGS; do
            FOUND="false"
            for old in $BEFORE_TAGS; do
              if [[ "$tag" == "$old" ]]; then
                FOUND="true"
                break
              fi
            done
            if [[ "$FOUND" == "false" ]]; then
              NEW_TAGS="$NEW_TAGS $tag"
            fi
          done
          NEW_TAGS="$(echo "$NEW_TAGS" | xargs || true)"

          if [[ -n "$NEW_TAGS" ]]; then
            TAG_COUNT="$(wc -w <<< "$NEW_TAGS" | tr -d ' ')"
            if [[ "$TAG_COUNT" -ne 1 ]]; then
              echo "::error::Expected exactly one new release tag, found: $NEW_TAGS"
              exit 1
            fi

            RELEASE_TAG="$NEW_TAGS"
            RELEASE_VERSION="${RELEASE_TAG#v}"
            DEPLOYABLE="true"
          fi

          {
            printf 'RELEASE_SHA=%s\n' "$RELEASE_SHA"
            printf 'RELEASE_SHORT_SHA=%s\n' "$SHORT_SHA"
            printf 'DEPLOYABLE=%s\n' "$DEPLOYABLE"
            printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG"
            printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION"
          } > release-metadata.env

          echo "deployable=$DEPLOYABLE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

          echo "Release metadata generated:"
          cat release-metadata.env

      - name: Create GitHub Release
        if: steps.metadata.outputs.deployable == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.metadata.outputs.release_tag }}" \
            --title "${{ steps.metadata.outputs.release_tag }}" \
            --generate-notes

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-metadata
          path: release-metadata.env
          if-no-files-found: error
          retention-days: 7