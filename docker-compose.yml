services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      nextapp:
        condition: service_healthy
      socket:
        condition: service_healthy
    networks:
      - chatnet

  nextapp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      ORIGIN: http://localhost
      SOCKET_SERVER_URL: http://socket:3001
    depends_on:
      - socket
    healthcheck:
      test: [ "CMD", "node", "-e", "require('net').connect({host:'127.0.0.1',port:3000}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chatnet

  socket:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/socket.Dockerfile
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ORIGIN: http://localhost
      REDIS_URL: redis://redis:6379
      WEB_SERVER_URL: http://nextapp:3000
    healthcheck:
      test: [ "CMD", "node", "-e", "require('net').connect({host:'127.0.0.1',port:3001}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      - redis
    networks:
      - chatnet

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chatnet
  task-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/task-worker/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      SOCKET_SERVER_URL: http://socket:3001
    depends_on:
      - redis
      - socket
    networks:
      - chatnet

volumes:
  redis_data:

networks:
  chatnet:
    driver: bridge
