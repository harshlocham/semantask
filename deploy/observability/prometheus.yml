global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: semantask-web
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          service: web

  - job_name: semantask-socket
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3001
        labels:
          service: socket

  - job_name: semantask-task-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9091
        labels:
          service: task-worker
