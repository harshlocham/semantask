# Docker embedded DNS — re-resolve container IPs after recreates (avoids 502 stale upstream).
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name semantask.com www.semantask.com localhost _;

    # Prefer apex as canonical once HTTPS is configured; until then www still serves.
    if ($host = www.semantask.com) {
        return 301 http://semantask.com$request_uri;
    }

    location /api/socket {
        set $socket_upstream http://socket:3001;
        proxy_pass $socket_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location / {
        set $nextapp_upstream http://nextapp:3000;
        proxy_pass $nextapp_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
